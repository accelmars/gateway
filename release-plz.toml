[workspace]
changelog_config = "cliff.toml"
# Disable crates.io publishing until we're ready to release publicly.
# Remove this line when CARGO_REGISTRY_TOKEN is configured and crates are publish-ready.
publish = false
# cargo-dist owns GitHub Release creation (with binary assets).
# release-plz creates git tags only; GitHub Releases are created by cargo-dist.
git_release_enable = false
# Enforce package-prefixed tags: accelmars-gateway-v{version}
git_tag_name = "{{ package }}-v{{ version }}"
