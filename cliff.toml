[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}(**{{ commit.scope }}**) {% endif %}\
{% if commit.breaking %}[**BREAKING**] {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.links %} ([{{ commit.links | map(attribute="index") | join(sep=", ") }}]({{ commit.links | first | get(key="url") }})){% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/accelmars/gateway/pull/$1" },
]
commit_parsers = [
    # Skip release-plz release commits — meta, not user-facing
    { message = "^chore: release", skip = true },
    { message = "^chore\\(release\\)", skip = true },

    # Breaking changes — always shown first regardless of type
    { message = "^feat!|^fix!|^refactor!|^perf!", group = "<!-- 0 -->Breaking Changes" },

    # User-facing changes
    { message = "^feat", group = "<!-- 1 -->Features" },
    { message = "^fix", group = "<!-- 2 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 3 -->Performance" },

    # Gateway-specific: provider adapter contributions
    { message = "^adapter", group = "<!-- 4 -->Provider Adapters" },

    # Maintenance — shown but lower priority
    { message = "^refactor", group = "<!-- 5 -->Refactor" },
    { message = "^doc", group = "<!-- 6 -->Documentation" },
    { message = "^test", group = "<!-- 7 -->Testing" },
    { message = "^chore|^ci|^build", group = "<!-- 8 -->Miscellaneous" },

    # Noise — skip entirely
    { message = "^style", skip = true },
    { message = "^wip", skip = true },
]
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
